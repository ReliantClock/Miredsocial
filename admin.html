<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedCW — Panel Admin</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app-shell"></div>

<main class="container-wide page-content">
  <h2 style="font-family:var(--font-display);margin-bottom:20px">Panel de Administración</h2>

  <div class="section-tabs" style="margin-bottom:20px">
    <button class="section-tab active" onclick="showAdminTab('users',this)">👥 Usuarios</button>
    <button class="section-tab" onclick="showAdminTab('blacklist',this)">🚫 Lista Negra</button>
    <button class="section-tab" onclick="showAdminTab('plans-view',this)">⭐ Planes Activos</button>
  </div>

  <!-- Usuarios -->
  <div id="tab-users">
    <div class="search-bar" style="max-width:400px;margin-bottom:16px">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Buscar usuario..." id="admin-search" oninput="onAdminSearch(this.value)">
    </div>
    <div style="overflow-x:auto">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado / Plan</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
    <div class="spinner" id="users-spinner"></div>
    <div style="text-align:center;margin-top:16px" id="load-more-users">
      <button class="btn-ghost" onclick="loadMoreUsers()">Cargar más</button>
    </div>
  </div>

  <!-- Lista negra -->
  <div id="tab-blacklist" style="display:none">
    <table class="admin-table">
      <thead><tr><th>Correo</th><th>Razón</th><th>Fecha</th><th>Acción</th></tr></thead>
      <tbody id="blacklist-tbody"></tbody>
    </table>
    <div class="spinner" id="bl-spinner"></div>
  </div>

  <!-- Planes activos -->
  <div id="tab-plans-view" style="display:none">
    <table class="admin-table">
      <thead><tr><th>Usuario</th><th>Plan</th><th>Vence</th></tr></thead>
      <tbody id="plans-tbody"></tbody>
    </table>
    <div class="spinner" id="plans-spinner"></div>
  </div>
</main>

<script src="config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/cloudinary.js"></script>
<script src="js/posts.js"></script>
<script src="js/forums.js"></script>
<script src="js/plans.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
window.supabase = createClient(REDCW_CONFIG.supabase.url, REDCW_CONFIG.supabase.anonKey);

let usersOffset = 0;

window.showAdminTab = (tab, btn) => {
  ["users","blacklist","plans-view"].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? "" : "none";
  });
  document.querySelectorAll(".section-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (tab === "blacklist") loadBlacklistTab();
  if (tab === "plans-view") loadPlansTab();
};

window.loadMoreUsers = async () => {
  usersOffset += 20;
  const users = await adminLoadUsers({ limit: 20, offset: usersOffset });
  users.forEach(u => renderUserRow(u, "users-tbody"));
  if (users.length < 20) document.getElementById("load-more-users").style.display = "none";
};

let searchT;
window.onAdminSearch = (val) => {
  clearTimeout(searchT);
  searchT = setTimeout(async () => {
    const users = await adminLoadUsers({ search: val });
    document.getElementById("users-tbody").innerHTML = "";
    users.forEach(u => renderUserRow(u, "users-tbody"));
  }, 400);
};

async function loadBlacklistTab() {
  document.getElementById("bl-spinner").style.display = "block";
  const list = await loadBlacklist();
  document.getElementById("bl-spinner").style.display = "none";
  const tbody = document.getElementById("blacklist-tbody");
  tbody.innerHTML = "";
  list.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.email}</td>
      <td>${item.reason || "—"}</td>
      <td>${new Date(item.created_at).toLocaleDateString()}</td>
      <td><button class="btn-success btn-sm" onclick="removeFromBlacklist('${item.id}','${item.email}').then(()=>loadBlacklistTab())">Restaurar</button></td>`;
    tbody.appendChild(tr);
  });
}

async function loadPlansTab() {
  document.getElementById("plans-spinner").style.display = "block";
  const { data } = await supabase.from("profiles")
    .select("id, username, display_name, avatar_url, plan, plan_expires_at")
    .neq("plan", "free").order("plan_expires_at", { ascending: false });
  document.getElementById("plans-spinner").style.display = "none";
  const tbody = document.getElementById("plans-tbody");
  tbody.innerHTML = "";
  (data||[]).forEach(u => {
    const tr = document.createElement("tr");
    const exp = u.plan_expires_at ? new Date(u.plan_expires_at).toLocaleDateString() : "—";
    tr.innerHTML = `
      <td><div class="user-cell">
        ${u.avatar_url ? `<img src="${u.avatar_url}" class="mini-avatar">` : `<div class="mini-avatar-placeholder">${(u.display_name||"U")[0]}</div>`}
        <div><span class="user-display">${u.display_name||u.username}</span><span class="user-sub">@${u.username}</span></div>
      </div></td>
      <td><span class="badge badge-plan">${u.plan.toUpperCase()}</span></td>
      <td>${exp}</td>`;
    tbody.appendChild(tr);
  });
}

document.addEventListener("DOMContentLoaded", async () => {
  await loadShell("admin");
  if (!isAdmin()) { window.location.href = "index.html"; return; }
  document.getElementById("users-spinner").style.display = "block";
  const users = await adminLoadUsers({ limit: 20 });
  document.getElementById("users-spinner").style.display = "none";
  users.forEach(u => renderUserRow(u, "users-tbody"));
  if (users.length < 20) document.getElementById("load-more-users").style.display = "none";
});
</script>
</body>
</html>
