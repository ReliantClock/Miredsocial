<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedCW — Nueva Contraseña</title>
  <link rel="stylesheet" href="css/main.css">
  <style>body{padding:0}</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">RedCW</div>
    <p class="auth-tagline">Restablece tu contraseña</p>
    <form class="auth-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" id="new-pass" required minlength="6" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="confirm-pass" required placeholder="Repite la contraseña">
      </div>
      <p id="reset-msg" class="form-error" style="display:none"></p>
      <button type="submit" class="btn-primary">Guardar nueva contraseña</button>
    </form>
  </div>
</div>
<script src="config.js"></script>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const supabase = createClient(REDCW_CONFIG.supabase.url, REDCW_CONFIG.supabase.anonKey);

window.handleReset = async (e) => {
  e.preventDefault();
  const pass    = document.getElementById("new-pass").value;
  const confirm = document.getElementById("confirm-pass").value;
  const msg     = document.getElementById("reset-msg");
  if (pass !== confirm) { msg.textContent = "Las contraseñas no coinciden."; msg.style.display = ""; return; }
  const { error } = await supabase.auth.updateUser({ password: pass });
  msg.style.display = "";
  if (error) { msg.textContent = error.message; msg.style.color = "var(--danger)"; }
  else {
    msg.textContent = "Contraseña actualizada. Redirigiendo...";
    msg.style.color = "var(--success)";
    setTimeout(() => window.location.href = "index.html", 2000);
  }
};
</script>
</body>
</html>
